name: Publish Paper

on:
  workflow_dispatch:
    inputs:
      basename:
        description: "Paper folder name (e.g. eng-graph-theory)"
        required: true
      version:
        description: "Version string (e.g. v0.1-exploratory)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout pressroom (templates and pandoc)
        uses: actions/checkout@v4
        with:
          path: pressroom

      - name: Checkout ideas-workbench (papers)
        uses: actions/checkout@v4
        with:
          repository: zzpanic/ideas-workbench
          token: ${{ secrets.PAPERS_TOKEN }}
          path: ideas-workbench

      - name: Validate manifest
        id: validate
        run: |
          MANIFEST="ideas-workbench/${{ inputs.basename }}/publish/manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: manifest.json not found at $MANIFEST"
            exit 1
          fi

          GATE=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('gate',''))")
          VERSION=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(m.get('version',''))")
          PLACEHOLDERS=$(python3 -c "import json; m=json.load(open('$MANIFEST')); print(str(m.get('checklist',{}).get('placeholders_resolved',False)).lower())")

          echo "Gate: $GATE"
          echo "Version: $VERSION"
          echo "Placeholders resolved: $PLACEHOLDERS"

          if [[ "$GATE" == "review" || "$GATE" == "published" ]]; then
            if [[ "$PLACEHOLDERS" != "true" ]]; then
              echo "ERROR: Gate '$GATE' requires all placeholders resolved"
              exit 1
            fi
          fi

          echo "gate=$GATE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Pandoc metadata
        run: |
          python3 - <<EOF
          import json, yaml

          manifest_path = "ideas-workbench/${{ inputs.basename }}/publish/manifest.json"
          with open(manifest_path) as f:
              m = json.load(f)

          meta = {
              "title":    m.get("title", "Untitled"),
              "author":   m.get("author", ""),
              "email":    m.get("email", ""),
              "date":     m.get("date_modified", ""),
              "version":  m.get("version", ""),
              "gate":     m.get("gate", ""),
              "license":  m.get("license", ""),
              "abstract": m.get("abstract", ""),
          }

          with open("/tmp/meta.yaml", "w") as f:
              yaml.dump(meta, f, allow_unicode=True)

          print("Metadata extracted:", meta)
          EOF

      - name: Build PDF
        run: |
          BASENAME="${{ inputs.basename }}"
          PAPER="ideas-workbench/$BASENAME/publish/paper.md"
          TEMPLATE="pressroom/pandoc/whitepaper.latex"

          if [ ! -f "$PAPER" ]; then
            echo "ERROR: paper.md not found"
            exit 1
          fi

          pandoc "$PAPER" \
            --template "$TEMPLATE" \
            --metadata-file /tmp/meta.yaml \
            --pdf-engine=xelatex \
            -o /tmp/paper.pdf

          echo "PDF built successfully"

      - name: Snapshot version folder to ideas-workbench
        run: |
          BASENAME="${{ inputs.basename }}"
          VERSION="${{ inputs.version }}"
          DEST="ideas-workbench/$BASENAME/$VERSION"
          SRC="ideas-workbench/$BASENAME/publish"

          mkdir -p "$DEST"
          cp /tmp/paper.pdf        "$DEST/paper.pdf"
          cp "$SRC/manifest.json"  "$DEST/manifest.json"

          if [ -d "$SRC/artifacts" ]; then
            cp -r "$SRC/artifacts" "$DEST/artifacts"
          fi

          cd ideas-workbench
          git config user.name  "pressroom"
          git config user.email "actions@github.com"
          git add "$BASENAME/$VERSION/"
          git commit -m "publish: $BASENAME $VERSION"
          git push

      - name: Create GitHub Release in ideas-workbench
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.basename }}-${{ inputs.version }}"
          name: "${{ inputs.basename }} ${{ inputs.version }}"
          body: |
            Published via Pressroom.

            **Paper:** ${{ inputs.basename }}
            **Version:** ${{ inputs.version }}
            **Gate:** ${{ steps.validate.outputs.gate }}
          files: /tmp/paper.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.PAPERS_TOKEN }}
