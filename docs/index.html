<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressroom — System Specification</title>
<style>
:root {
  --sidebar-width: 280px;
  --color-primary: #1a527a;
  --color-link: #2980b9;
  --color-bg: #ffffff;
  --color-text: #2c3e50;
  --color-border: #ecf0f1;
  --color-sidebar-bg: #f8f9fa;
  --color-heading: #1a252f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--color-text);
  line-height: 1.7;
  display: flex;
}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100vh;
  position: sticky;
  top: 0;
  background: var(--color-sidebar-bg);
  border-right: 1px solid var(--color-border);
  overflow-y: auto;
  padding: 20px 16px;
  font-size: 14px;
}

#sidebar h2 {
  font-size: 16px;
  margin-bottom: 12px;
  color: var(--color-heading);
  padding-bottom: 8px;
  border-bottom: 2px solid var(--color-primary);
}

#search-box {
  width: 100%;
  padding: 8px 12px;
  margin-bottom: 16px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}

#sidebar nav ul { list-style: none; }
#sidebar nav li { margin: 2px 0; }

#sidebar nav a {
  display: block;
  padding: 3px 8px;
  color: var(--color-link);
  text-decoration: none;
  border-radius: 3px;
}

#sidebar nav a:hover { background: #e8f0fe; }

#sidebar nav .indent-1 { padding-left: 8px; font-weight: 600; color: var(--color-heading); }
#sidebar nav .indent-2 { padding-left: 24px; }
#sidebar nav .indent-3 { padding-left: 40px; font-size: 13px; }

.badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
}
.badge-ready { background: #d4edda; color: #155724; }
.badge-partial { background: #fff3cd; color: #856404; }
.badge-deferred { background: #f8d7da; color: #721c24; }

/* ── Main content ────────────────────────────────────────── */
#main {
  flex: 1;
  max-width: 900px;
  padding: 40px 48px;
  min-height: 100vh;
}

#main h1 { font-size: 28px; margin-bottom: 8px; color: var(--color-heading); }
#main .meta { font-size: 13px; color: #7f8c8d; margin-bottom: 24px; }
#main h2 { font-size: 22px; margin-top: 32px; margin-bottom: 12px; color: var(--color-heading); border-top: 2px solid var(--color-border); padding-top: 12px; }
#main h3 { font-size: 17px; margin-top: 24px; margin-bottom: 8px; color: var(--color-primary); }
#main h4 { font-size: 15px; margin-top: 20px; margin-bottom: 6px; }
#main p { margin-bottom: 14px; }
#main ul, #main ol { margin: 0 0 14px 24px; }
#main li { margin-bottom: 6px; }

#main blockquote {
  background: #f7f9fa;
  border-left: 4px solid var(--color-primary);
  padding: 12px 16px;
  margin: 16px 0;
  border-radius: 4px;
}

#main code {
  background: #f5f5f5;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 13px;
}

#main pre {
  background: #282c34;
  color: #abb2bf;
  padding: 16px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 16px 0;
  font-size: 13px;
}

#main pre code { background: none; color: inherit; padding: 0; }

#main table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
}

#main th, #main td {
  border: 1px solid var(--color-border);
  padding: 8px 12px;
  text-align: left;
}

#main th { background: #f7f9fa; font-weight: 600; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar { display: none; }
  #main { padding: 24px 16px; }
}
</style>
</head>
<body>

<aside id="sidebar">
<h2>Pressroom SPEC</h2>
<input type="text" id="search-box" placeholder="Search sections...">
<nav id="nav-tree"></nav>
</aside>

<main id="main"></main>

<script>
// SPEC.md content — parsed into structured data for HTML rendering
const specData = {
  title: "Pressroom \u2014 System Specification",
  meta: "Version: v0.2-alpha | Gate: alpha | Date: 2026-04-25 | Author: Patrick Nichols",
  sections: [
    {
      id: "overview", heading: "1. Overview",
      content: `Pressroom is a multi-user web application that manages the review, PDF generation, and publication of ideas from user-specific Ideas Workbenches. It runs as a Docker container deployed via Dockge. All content lives in external GitHub repositories \u2014 the app itself holds no persistent state beyond a lightweight SQLite store for user authentication and token management.`
    },
    {
      id: "repo-architecture", heading: "2. Repository Architecture",
      content: `The system uses three GitHub repositories, each with a specific responsibility:

| Repository | Visibility | Purpose |
|---|---|---|
| zzpanic/ideas-workbench (or per-user equivalent) | Private | Ideas, working files, config, pre-publish PDFs |
| zzpanic/pressroom | Public | App source code, Docker image, GitHub Actions |
| zzpanic/pressroom-pubs (or per-user equivalent) | Public | Published versioned snapshots (static, append-only) |

> **Why three repos?** The separation allows content (ideas-workbench) to be private while the app code and published output (pressroom, pressroom-pubs) remain public. Each user gets their own workbench and pubs repo, isolated from other users.`
    },
    {
      id: "folder-conventions", heading: "3. Folder Conventions", sub: true,
      subsections: [
        { id: "user-workbench", heading: "3.1 Per-User Ideas Workbench", content: `Each idea folder named with a slug (URL-friendly identifier). The publish/ subfolder holds the current working version. Versioned snapshots are never modified once created.` },
        { id: "user-pubs", heading: "3.2 Per-User Pressroom Pubs", content: `Mirrors the versioned snapshots from the user\'s workbench on publication.` },
        { id: "app-repo", heading: "3.3 Pressroom App Repo", content: `Source code structure with routers/, services/, static/, and docs/.` }
      ]
    },
    {
      id: "gate-model", heading: "4. Gate Model",
      content: `Gates represent the maturity of an idea. The gate is encoded in both the YAML frontmatter and the versioned folder/snapshot name.

| Gate | Version String | Meaning |
|---|---|---|
| alpha | v0.1-alpha | Title and stubs only |
| exploratory | v0.1-exploratory | Real content present, thinking visible |
| draft | v0.2-draft | Structured and substantive |
| review | v0.3-review | Complete, no unresolved placeholders |
| published | v1.0 | Packaged and live |`
    },
    {
      id: "frontmatter-schema", heading: "5. Frontmatter Schema",
      content: `All papers carry YAML frontmatter at the top of {slug}.md \u2014 the single source of truth for both content and metadata. Includes title, subtitle, author (nested object), date, version, gate, status, slug, license, AI usage flags, github_repo, zenodo_doi, and prior_art_disclosure.`
    },
    {
      id: "versioning", heading: "6. Versioned Snapshot Naming",
      content: `Folder names use the pattern v{major}.{minor}-{gate}. The slug is hyphenated lowercase, matching the idea folder name.`
    },
    {
      id: "runtime-behaviour", heading: "7. Pressroom App \u2014 Runtime Behaviour", sub: true,
      subsections: [

        { id: "env-vars", heading: "7.2 Environment Variables (Dockge)", content: `APP_USER, APP_PASSWORD, JWT_SECRET, JWT_EXPIRY_MINUTES, IDEAS_WORKBENCH_GIT_USER/TOKEN/REPO, PRESSROOM_PUBS_GIT_USER/TOKEN/REPO, PRESSROOM_REPO, GITHUB_BRANCH, PDF_ENGINE.` },
        { id: "config-source", heading: "7.3 Config Source", content: `Pressroom reads user config (templates, author details) from {user-workbench}/zz-pressroom/ via GitHub API.` },
        { id: "metadata", heading: "7.4 Metadata", content: `YAML frontmatter inside publish/{idea-slug}.md is the single source of truth.` },
        { id: "publish-workflow", heading: "7.5 Publish Workflow", content: `Pull \u2192 Generate PDF \u2192 Write review copy \u2192 Review \u2192 Approve \u2192 Snapshot \u2192 Mirror to pressroom-pubs.` }
      ]
    },
    {
      id: "pdf-generation", heading: "8. PDF Generation \u2014 Modular Engine Architecture", sub: true,
      subsections: [
        { id: "engine-protocol", heading: "8.1 Engine Protocol", content: `PDFEngine Protocol defines generate(slug, body, frontmatter, template) -> Path for every engine.` },
        { id: "available-engines", heading: "8.2 Available Engines", content: `pandoc (default, via XeLaTeX) and sile (Lua-based typesetting). Selected via PDF_ENGINE env var.` },
        { id: "template-resolution", heading: "8.3 Template Resolution Order", content: `User zz-pressroom/templates/ \u2192 Bundled app templates \u2192 Remote from PRESSROOM_REPO (deprecated).` },

      subsections: [
        { id: "auth-flow", heading: "9.1 Authentication Flow", content: `Login \u2192 Credential validation (SQLite or env vars) \u2192 JWT issuance \u2192 Browser Bearer token \u2192 Middleware validation \u2192 Per-user token lookup.` },

        { id: "status-endpoints", heading: "10.3 Status Endpoints (Future)", content: `GET /api/status/{task_id}, WS /api/ws/status, POST /api/tasks/cancel/{id}.` }
      ]
    },
    {
      id: "publish-formats", heading: "11. Extensible Publish Formats",
      content: `Publishers implement the Publisher protocol with publish(slug, version, content, frontmatter) -> PublishResult. pdf (implemented), blog (stub), docx (stub), html (deferred), zenodo (deferred).`
    },
    {
      id: "security", heading: "12. Security", sub: true,
      subsections: [
        { id: "auth-security", heading: "12.1 Authentication \u2014 Two Modes", content: `Single-user: HTTP Basic (default admin/pressroom). Multi-user: JWT Bearer tokens.` },
        { id: "token-security", heading: "12.2 Token Security \u2014 Encryption at Rest", content: `AES-256-GCM, per-user derived master key from JWT_SECRET.` },
        { id: "input-validation", heading: "12.3 Input Validation", content: `Pydantic models validate all request bodies before endpoint logic.` },
        { id: "template-sandboxing", heading: "12.4 Template Sandboxing", content: `No network access, filesystem restricted to /tmp/pressroom/{slug}/, CPU/memory limits via cgroups.` }
      ]
    },
    {
      id: "logging", heading: "13. Logging and Observability", sub: true,
      subsections: [
        { id: "structured-logging", heading: "13.1 Structured Logging \u2014 JSON Format", content: `JsonFormatter outputs structured logs for log aggregation tools.` },
        { id: "log-levels", heading: "13.2 Log Levels and Usage", content: `DEBUG, INFO, WARNING, ERROR, CRITICAL with usage guidance.` },

        { id: "example-test", heading: "15.3 Example Test \u2014 Frontmatter Parsing", content: `Test setup, execution, assertion pattern documented.` }
      ]
    },
    {
      id: "docker-deployment", heading: "16. Docker and Deployment", sub: true,
      subsections: [
        { id: "multi-stage-build", heading: "16.1 Multi-Stage Build \u2014 Smaller Image", content: `Builder stage installs pandoc + LaTeX; runtime stage copies binaries (~150MB vs ~700MB).` },
        { id: "health-check", heading: "16.2 Health Check", content: `HEALTHCHECK instruction with /api/health endpoint.` },

      ]
    },
    {
      id: "placeholder-convention", heading: "17. Placeholder Convention",
      content: `[PLACEHOLDER: descriptive text] format. Vague placeholders like [TODO] are not acceptable.`
    },
    {
      id: "deferred-items", heading: "18. Deferred Items",
      content: `HTML preview (deferred), Multiple templates (partial), pressroom-pubs web frontend (deferred), GitHub Actions publish workflow (partial), Zenodo DOI minting (deferred).`
    },
    {
      id: "open-questions", heading: "19. Open Questions",
      content: `Multiple author profiles, Zenodo scope, per-user vs shared pressroom-pubs repo.`
    },
    {
      id: "glossary", heading: "Appendix A: Glossary",
      content: `slug, gate, version string, frontmatter, snapshot, mirror, workbench, pubs definitions.`
    }
  ]

// ── Build Sidebar Navigation ───────────────────────────────────
function buildNav() {
  const nav = document.getElementById("nav-tree");
  let html = "";

  specData.sections.forEach(sec => {
    if (sec.sub && sec.subsections) {
      html += `<ul>`;
      html += `<li class="indent-1"><a href="#${sec.id}">${sec.heading}</a></li>`;
      sec.subsections.forEach(sub => {
        html += `<li class="indent-2"><a href="#${sub.id}">${sub.heading}</a></li>`;
      });
      html += `</ul>`;
    } else {
      html += `<ul><li class="indent-1"><a href="#${sec.id}">${sec.heading}</a></li></ul>`;
    }
  });

  nav.innerHTML = html;
}

// ── Render Main Content ────────────────────────────────────────
function renderContent() {
  const main = document.getElementById("main");
  let html = `<h1>${specData.title}</h1>`;
  html += `<p class="meta">${specData.meta}</p>`;

  specData.sections.forEach(sec => {
    html += `<section id="${sec.id}">`;
    html += `<h2>${sec.heading}</h2>`;
    if (sec.content) {
      html += renderMarkdown(sec.content);
    }
    if (sec.subsections) {
      sec.subsections.forEach(sub => {
        html += `<h3 id="${sub.id}">${sub.heading}</h3>`;
        html += renderMarkdown(sub.content);
      });
    }
    html += `</section>`;
  });

  main.innerHTML = html;
}

// ── Simple Markdown Renderer ───────────────────────────────────
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```([\s\S]*?)```/g, (m, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });

  // Tables
  text = text.replace(/\|(.+)\|\n\|[-| :]+\|((\|.+\|)+\|)?/gm, (line1, header, _sep, body) => {
    // Simple table detection - full implementation in production
    return `<p><em>Table rendering requires full markdown parser</em></p>`;
  });

  // Bold and italic
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");

  // Inline code
  text = text.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Blockquotes
  text = text.replace(/^>\s+(.+)$/gm, "<blockquote>$1</blockquote>");

  // Paragraphs
  text = text.replace(/\n\n/g, "</p><p class=\"p\">");
  text = text.replace(/\n/g, "<br>");

  return `<div>${text}</div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g, "&").replace(/</g, "<").replace(/>/g, ">");
}

// ── Search ──────────────────────────────────────────────────────
document.getElementById("search-box").addEventListener("input", function(e) {
  const query = e.target.value.toLowerCase();
  const links = document.querySelectorAll("#sidebar nav a");

  links.forEach(link => {
    const sectionId = link.getAttribute("href").substring(1);
    const section = document.getElementById(sectionId);
    if (section) {
      const text = section.textContent.toLowerCase();
      link.style.display = text.includes(query) ? "" : "none";
    }
  });
});

// ── Smooth scroll for anchor links ──────────────────────────────
document.querySelectorAll("#main a[href^=\"#\"]').forEach(a => {
  a.addEventListener("click", e => {
    e.preventDefault();
    const target = document.getElementById(a.getAttribute("href").substring(1));
    if (target) target.scrollIntoView({ behavior: "smooth" });
  });
});

// ── Initialize ──────────────────────────────────────────────────
buildNav();
renderContent();
</script>

</body>
</html>
